agents:
  goal_extractor:
    inputs: [profile_targets, profile_skills]
    outputs: [search_prompts]
  web_scrapers:
    inputs: [search_prompt, search_category]
    outputs: [raw_job_results, raw_cert_results, raw_event_results, raw_group_results, raw_trend_results]
  url_validator:
    inputs: [raw_job_results, raw_cert_results, raw_event_results, raw_group_results, raw_trend_results]
    outputs: [raw_job_results, raw_cert_results, raw_event_results, raw_group_results, raw_trend_results]
  data_formatter:
    inputs: [raw_job_results, raw_cert_results, raw_event_results, raw_group_results, raw_trend_results]
    outputs: [formatted_jobs, formatted_certifications, formatted_courses, formatted_events, formatted_groups, formatted_trends]
  ceo:
    inputs: [formatted_jobs, formatted_certifications, formatted_courses, formatted_events, formatted_groups, formatted_trends, profile_targets]
    outputs: [strategic_recommendations, ceo_summary]
  cfo:
    inputs: [formatted_jobs, formatted_certifications, formatted_courses, formatted_events, formatted_groups, formatted_trends, profile_targets]
    outputs: [risk_assessments, cfo_summary]
  cv_summarizer:
    inputs: [raw_cv_content]
    outputs: [summarized_cv]
  cover_letter_agent:
    inputs: [cv_content, jd_text, job_opportunity]
    outputs: [cover_letter_content]
  audit_writer:
    inputs: [all_outputs, run_metadata]
    outputs: [audit_log, run_bundle]
